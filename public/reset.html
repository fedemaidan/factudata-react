<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reiniciando Sorbydata…</title>
  <style>
    html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0b0b0c;color:#eee;display:flex;align-items:center;justify-content:center}
    .box{max-width:480px;padding:24px;text-align:center}
    .spinner{width:32px;height:32px;border:3px solid #444;border-top-color:#fff;border-radius:50%;animation:s 1s linear infinite;margin:0 auto 16px}
    @keyframes s{to{transform:rotate(360deg)}}
    a{color:#9cf}
    code{background:#222;padding:2px 6px;border-radius:4px}
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h2>Reiniciando la aplicación…</h2>
    <p>Estamos limpiando el caché local. Esto toma unos segundos.</p>
    <p id="status" style="opacity:.7;font-size:13px"></p>
    <p style="font-size:12px;opacity:.5">Si en 10 segundos no avanza, <a href="/">tocá acá</a>.</p>
  </div>
  <script>
    (function () {
      var s = document.getElementById('status');
      function log(t){ try { s.textContent = t; } catch(_){} }

      function clearStorage() {
        try { localStorage.clear(); } catch (_) {}
        try { sessionStorage.clear(); } catch (_) {}
        try {
          document.cookie.split(';').forEach(function (c) {
            var name = c.split('=')[0].trim();
            if (name) {
              document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/';
              document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; domain=' + location.hostname;
            }
          });
        } catch (_) {}
      }

      function clearIndexedDB() {
        if (!window.indexedDB) return Promise.resolve();
        try {
          if (indexedDB.databases) {
            return indexedDB.databases().then(function (dbs) {
              return Promise.all((dbs || []).map(function (d) {
                return new Promise(function (res) {
                  if (!d.name) return res();
                  var req = indexedDB.deleteDatabase(d.name);
                  req.onsuccess = req.onerror = req.onblocked = function () { res(); };
                });
              }));
            }).catch(function () {});
          }
          ['firebaseLocalStorageDb', 'firebase-installations-database', 'firebase-heartbeat-database', 'firebase-messaging-database', 'firestore/[DEFAULT]'].forEach(function (n) {
            try { indexedDB.deleteDatabase(n); } catch (_) {}
          });
        } catch (_) {}
        return Promise.resolve();
      }

      function clearCaches() {
        if (!window.caches || !caches.keys) return Promise.resolve();
        return caches.keys().then(function (keys) {
          return Promise.all(keys.map(function (k) { return caches.delete(k); }));
        }).catch(function () {});
      }

      function clearSW() {
        if (!('serviceWorker' in navigator)) return Promise.resolve();
        return navigator.serviceWorker.getRegistrations().then(function (regs) {
          return Promise.all(regs.map(function (r) { return r.unregister(); }));
        }).catch(function () {});
      }

      log('Borrando storage…');
      clearStorage();
      log('Borrando service workers…');
      clearSW()
        .then(function () { log('Borrando caches…'); return clearCaches(); })
        .then(function () { log('Borrando IndexedDB…'); return clearIndexedDB(); })
        .then(function () {
          log('Listo, recargando…');
          setTimeout(function () {
            location.replace('/?reset=' + Date.now());
          }, 400);
        });
    })();
  </script>
</body>
</html>
